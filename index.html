<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>La mia prima pagina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Benvenuto nella mia pagina web</h1>
    <p>Questa è la mia prima pagina online 🚀</p>

    <button onclick="saluta()">Cliccami</button>

    <script>
        function saluta() {
            alert("Ciao! Funziona 🎉");
        }
    </script>

</body>
</html>
